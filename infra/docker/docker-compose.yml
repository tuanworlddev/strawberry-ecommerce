name: strawberry

services:
  postgres:
    image: postgres:18
    container_name: strawberry-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-strawberry_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strawberry_password}
      POSTGRES_DB: ${POSTGRES_DB:-strawberry_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-strawberry_user} -d ${POSTGRES_DB:-strawberry_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: strawberry-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-strawberry_mq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-strawberry_mq_password}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-strawberry/backend:local}
    container_name: strawberry-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-strawberry_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-strawberry_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-strawberry_password}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-strawberry_mq}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-strawberry_mq_password}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-strawberry/frontend:local}
    container_name: strawberry-frontend
    environment:
      PORT: 4000
      BACKEND_URL: http://backend:8080
    ports:
      - "${FRONTEND_PORT:-4200}:4000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: strawberry-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@strawberry.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
